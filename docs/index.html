<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boston Dan's Morning Brew</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,300,0,0" rel="stylesheet">
  <style>
    .ms {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 1.1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      user-select: none;
      vertical-align: middle;
      color: var(--on-surface-muted);
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
    }
    .ms.sport-nba  { color: #C9632A; }
    .ms.sport-nhl  { color: #B5C4D7; }
    .ms.sport-mlb  { color: #BD3039; }
    .ms.sport-nfl  { color: #8B7355; }
    .widget-header .ms {
      font-size: 0.9rem;
      width: 16px;
      height: 16px;
      color: var(--primary);
      margin-right: 6px;
      vertical-align: -2px;
    }
  </style>
  <style>
    /* =============================================
       DESIGN TOKENS — The Garden Slate System
    ============================================= */
    :root {
      /* Color Palette */
      --primary:         #00D084;      /* Primary green accent — headlines, CTAs, active states */
      --primary-container: #008456;    /* Secondary green — darker shade for gradients, muted accents */
      --secondary:       #008456;      /* Alias for secondary green */
      --tertiary:        #4A5568;      /* Blue-gray — borders, dividers, subtle UI */
      --neutral:         #1E1E1E;      /* Dark background */

      /* Surfaces */
      --surface-base:    #131313;      /* Main background */
      --surface-lowest:  #0E0E0E;      /* Darkest surface */
      --surface-low:     #1B1B1C;      /* Low-elevation cards */
      --surface:         #202020;      /* Mid-level surface */
      --surface-high:    #2A2A2A;      /* High-elevation surface, dividers */
      --surface-highest: #353535;      /* Highest-elevation surface, hover states */

      /* Text Colors */
      --on-primary:      #003920;      /* Text on primary (dark) */
      --on-surface:      #F5F5F5;      /* Primary text (light) */
      --on-surface-variant: #D5D5D5;   /* Secondary text */
      --on-surface-muted:   #999999;   /* Muted text, labels */
      --on-surface-dim:     #666666;   /* Dim text, footer */

      /* Semantic */
      --danger:          #BD3039;      /* Alert, loss states (Red Sox red) */

      /* Shadows & Effects */
      --shadow-ambient:  0 40px 60px rgba(229, 226, 225, 0.04);

      /* Typography */
      --font-display:    'Space Grotesk', sans-serif;
      --font-body:       'Inter', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--surface-base);
      color: var(--on-surface-variant);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* =============================================
       NAV
    ============================================= */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(19, 19, 19, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 0 32px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      text-decoration: none;
    }

    .nav-brand-logo {
      height: 49px;
      width: auto;
      display: block;
      flex-shrink: 0;
    }

    .nav-brand-text {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1.25rem;
      color: var(--primary);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--on-surface-muted);
      transition: color 0.2s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .nav-links a:hover { color: var(--on-surface); }

    .nav-feedback-btn {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 0 16px;
      background: var(--primary);
      color: var(--on-primary) !important;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background 0.2s ease, opacity 0.2s ease;
    }
    .nav-feedback-btn:hover { background: var(--primary-container); opacity: 1; color: var(--on-primary) !important; }

    .feedback-button {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 16px;
      background: var(--primary);
      color: var(--on-primary) !important;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-radius: 6px;
      white-space: nowrap;
      transition: background 0.2s ease, opacity 0.2s ease;
      margin-top: 24px;
      margin-bottom: 24px;
    }
    .feedback-button:hover { background: var(--primary-container); opacity: 1; color: var(--on-primary) !important; }

    /* =============================================
       CONTAINER
    ============================================= */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px 48px;
    }

    /* =============================================
       HERO
    ============================================= */
    .hero {
      margin-bottom: 32px;
      max-width: 780px;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 700;
      font-size: clamp(1.5rem, 3.5vw, 3rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0;
      width: 100%;
      overflow: visible;
      word-wrap: break-word;
    }
    .hero-headline .line-odd  { color: var(--on-surface); display: block; width: 100%; }
    .hero-headline .line-even { color: var(--primary);   display: block; width: 100%; }
    .hero-headline .line-last { font-size: 0.85em; }

    .hero-date {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--on-surface-muted);   /* #999 */
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    /* =============================================
       ABOVE-FOLD GRID
    ============================================= */
    .fold-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 48px;
      align-items: start;
    }

    .main-col { min-width: 0; }

    .rail-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-self: start;
    }

    /* =============================================
       MOBILE SCORE STRIP (only visible <768px)
    ============================================= */
    .mobile-strip {
      display: none;
    }

    /* =============================================
       MORNING BREW
    ============================================= */
    .morning-brew p {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.65;
      color: var(--on-surface-variant);
      margin-bottom: 18px;
    }

    /* =============================================
       STAT SPLASH
    ============================================= */
    .stat-splash {
      background: var(--surface-highest);
      border-radius: 8px;
      padding: 24px 28px;
      margin: 24px 0;
      box-shadow: var(--shadow-ambient);
    }
    .stat-splash-number {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-splash-label {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--on-surface-muted);
      margin-top: 8px;
    }
    .stat-splash-subtitle {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      margin-top: 4px;
    }
    .stat-splash-leader {
      margin-top: 18px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }
    .stat-splash-leader-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-splash-leader-tag {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
    }
    .stat-splash-leader-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--on-surface);
    }
    .stat-splash-leader-stats {
      font-size: 0.75rem;
      color: var(--on-surface-muted);
    }

    /* =============================================
       BLOCKQUOTE
    ============================================= */
    blockquote.featured-quote {
      border-left: 3px solid var(--primary);
      padding: 6px 0 6px 20px;
      margin: 24px 0;
    }
    blockquote.featured-quote p {
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 500;
      font-size: 1.0625rem !important;
      line-height: 1.55 !important;
      color: var(--on-surface) !important;
      margin-bottom: 0 !important;
    }

    /* =============================================
       RAIL WIDGETS
    ============================================= */
    .widget {
      background: var(--surface-low);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow-ambient);
    }

    .widget-header {
      font-family: var(--font-display);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--on-surface-muted);
      margin-bottom: 12px;
    }

    /* Scoreboard rows */
    .score-rows { display: flex; flex-direction: column; gap: 8px; }

    .score-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      white-space: nowrap;
      align-items: center;
      gap: 10px;
      background: var(--surface-highest);
      padding: 12px 14px;
      border-radius: 6px;
      min-height: 48px;
      font-family: var(--font-body);
      font-size: 0.8125rem;
    }
    .score-row.dim { opacity: 0.5; }

    .score-sport-emoji { font-size: 1rem; line-height: 1; }

    .score-matchup {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--on-surface);
      letter-spacing: 0.3px;
    }
    .score-matchup .team-code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.8125rem;
      letter-spacing: 0.5px;
    }
    .score-matchup .team-code.win  { color: var(--primary); }
    .score-matchup .team-code.loss { color: var(--danger); }
    .score-matchup .team-score {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--on-surface);
      margin: 0 2px;
    }
    .score-matchup .vs {
      color: var(--on-surface-muted);
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: lowercase;
    }

    .score-status {
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--on-surface-muted);
      justify-self: end;
    }

    /* Next up rows */
    .nextup-rows { display: flex; flex-direction: column; gap: 6px; }

    .nextup-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: var(--surface-highest);
      min-height: 48px;
      font-size: 0.75rem;
    }

    .schedule-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--surface-high);
      font-size: 0.8125rem;
      gap: 10px;
    }

    .schedule-date-label {
      font-family: var(--font-display);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--on-surface-muted);
      padding: 10px 0 4px;
    }

    .nextup-date {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
    }

    .nextup-matchup {
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--on-surface);
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nextup-time {
      font-size: 0.6875rem;
      color: var(--on-surface-muted);
      font-weight: 500;
      justify-self: end;
    }

    /* Trend pulse */
    .pulse-category {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary-container), var(--primary));
      color: var(--on-primary);
      font-family: var(--font-body);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 10px;
    }
    .pulse-player {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .pulse-trend {
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .pulse-card { padding: 4px 0; }
    .pulse-card--sep { border-top: 1px solid var(--surface-highest); margin-top: 14px; padding-top: 14px; }

    .pulse-news-headline {
      font-family: var(--font-display);
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--on-surface-variant);
      line-height: 1.35;
      display: block;
      margin-bottom: 6px;
      transition: color 0.2s;
    }
    .pulse-news-headline:hover { color: var(--primary); }

    .schedule-section {
      margin-top: 32px;
    }

    .pulse-take {
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--primary);
      line-height: 1.5;
    }

    /* =============================================
       BELOW-FOLD SECTIONS
    ============================================= */
    .below-fold { margin-top: 48px; }

    .section {
      margin-bottom: 48px;
    }

    .section-header {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    /* Trend Watch — 3-col desktop */
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .trend-card {
      background: var(--surface-low);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow-ambient);
      transition: background 0.2s ease;
    }
    .trend-card:hover { background: var(--surface-highest); }

    .trend-category-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary-container), var(--primary));
      color: var(--on-primary);
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .trend-player {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .trend-text {
      font-size: 0.875rem;
      color: var(--on-surface-muted);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .trend-take {
      font-style: italic;
      font-size: 0.875rem;
      color: var(--primary);
      line-height: 1.5;
    }

    /* News Digest — 2-col desktop */
    .news-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 28px;
    }
    .news-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 0;
      min-height: 44px;
      justify-content: center;
    }
    .news-headline {
      font-family: var(--font-display);
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.3;
      transition: color 0.2s ease;
    }
    .news-headline:hover { color: var(--danger); }
    .news-take {
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      line-height: 1.5;
    }

    /* Footer */
    .site-footer {
      text-align: center;
      padding: 24px 16px 0;
      font-size: 0.75rem;
      color: var(--on-surface-dim);
    }

    /* Loading / Error */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--surface-highest);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--font-display);
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--on-surface-muted);
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--danger);
    }
    .error-message { font-size: 0.9375rem; color: var(--on-surface-muted); }

    /* =============================================
       RESPONSIVE — TABLET (768–1023px)
    ============================================= */
    @media (max-width: 1023px) {
      .fold-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }
      .rail-col {
        position: static;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .rail-col .widget { grid-column: 1 / -1; }

      .trend-grid { grid-template-columns: repeat(2, 1fr); }
      .news-grid  { grid-template-columns: 1fr; }
    }

    /* =============================================
       RESPONSIVE — MOBILE (<768px)
    ============================================= */
    @media (max-width: 767px) {
      .nav { padding: 0 16px; gap: 10px; }
      .nav-links { display: none; }

      .page { padding: 20px 16px 32px; }

      .hero { margin-bottom: 20px; }
      .hero-headline { font-size: clamp(1.875rem, 7vw, 2.5rem); }
      .morning-brew p { font-size: 1rem; }

      /* Flatten fold-grid into a single vertical flex stack */
      .fold-grid {
        display: flex;
        flex-direction: column;
        gap: 24px;
      }
      .main-col { display: contents; }
      .rail-col  { display: contents; }

      /* Mobile order: rant → scores → feedback → trends → schedule → news */
      .morning-brew      { order: 1; }
      .widget.scoreboard { order: 2; }
      .widget.pulse      { order: 3; }
      .schedule-section  { order: 4; margin-top: 0; }
      .widget#news       { order: 5; }

      /* Hide mobile strip — scoreboard widget handles scores */
      .mobile-strip { display: none; }

      /* Layered density: tighten secondary + hide tertiary details */
      .widget.pulse .pulse-player { font-size: 1rem; }
      .pulse-card--sep { margin-top: 10px; padding-top: 10px; }

      .widget#news .pulse-take { display: none; }
      .widget#news .pulse-card:nth-child(n+6) { display: none; }
      /* News headline: smooth proportional scale instead of a hard size jump */
      .widget#news .pulse-news-headline { font-size: clamp(0.8125rem, 2.8vw, 0.9375rem); }

      .nextup-row { background: transparent; border-radius: 0; min-height: auto; padding: 0; }

      /* Scoreboard: allow reflow at very narrow widths */
      .score-row { white-space: normal; }

      /* Schedule: matchup shrinks proportionally, time stays fixed */
      .schedule-matchup { flex: 1 1 0; min-width: 0; }
      .schedule-time    { flex-shrink: 0; white-space: nowrap; }

      .stat-splash { padding: 20px; }
    }

  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a class="nav-brand" href="#">
      <img class="nav-brand-logo" src="logo.png" alt="Boston Dan's Morning Brew logo">
      <span class="nav-brand-text">Boston Dan's Morning Brew</span>
    </a>
    <nav class="nav-links" aria-label="Section links">
      <a href="#brew">Today's Rant</a>
      <a href="#trends">Trends</a>
      <a href="#news">News</a>
    </nav>
  </nav>

  <!-- MAIN CONTENT -->
  <div id="app">
    <div class="page">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading today's take…</p>
      </div>
    </div>
  </div>

  <script>
    const SPORT_MAP = { celtics: 'NBA', bruins: 'NHL', redsox: 'MLB', patriots: 'NFL' };
    const BOSTON_CODE = { celtics: 'CEL', bruins: 'BRU', redsox: 'SOX', patriots: 'NE' };
    const BOSTON_DISPLAY_NAME = { celtics: 'Celtics', bruins: 'Bruins', redsox: 'Red Sox', patriots: 'Patriots' };
    const SPORT_ICON  = { NBA: 'sports_basketball', NHL: 'sports_hockey', MLB: 'sports_baseball', NFL: 'sports_football' };
    const SPORT_CLASS = { NBA: 'sport-nba', NHL: 'sport-nhl', MLB: 'sport-mlb', NFL: 'sport-nfl' };
    const OPP_CODE = {
      'detroit tigers': 'DET', 'new york yankees': 'NYY', 'philadelphia 76ers': 'PHI',
      'philadelphia flyers': 'PHI', 'buffalo sabres': 'BUF', 'boston celtics': 'BOS',
      'boston bruins': 'BOS', 'boston red sox': 'BOS', 'new england patriots': 'NE',
    };

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t == null ? '' : String(t); return d.innerHTML; }
    function oppCode(name) { if (!name) return 'OPP'; const key = String(name).toLowerCase(); if (OPP_CODE[key]) return OPP_CODE[key]; const words = String(name).trim().split(/\s+/); const last = words[words.length - 1] || 'OPP'; return last.slice(0, 3).toUpperCase(); }
    function shortDate(dateStr) { if (!dateStr) return ''; const parts = dateStr.split('-'); if (parts.length < 3) return dateStr; const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2])); const days = ['SUN','MON','TUE','WED','THU','FRI','SAT']; return `${days[d.getDay()]} ${d.getDate()}`; }

    function buildHeroHeadline(text) { const words = (text || '').trim().split(/\s+/); const chunks = []; if (words.length > 0) chunks.push(words.slice(0, 4).join(' ')); if (words.length > 4) chunks.push(words.slice(4, 8).join(' ')); if (words.length > 8) chunks.push(words.slice(8).join(' ')); return chunks.map((chunk, idx) => { const cls = (idx % 2 === 0) ? 'line-odd' : 'line-even'; const cls2 = (idx === 2) ? ` line-last` : ''; return `<span class="${cls}${cls2}">${escapeHtml(chunk)}</span>`; }).join(''); }
    function trimHeadlineFromBody(text) { const words = (text || '').trim().split(/\s+/); return words.slice(20).join(' '); }

    function extractGame(teamKey, team) {
      if (!team) return null;
      const sport = team.sport || SPORT_MAP[teamKey];
      const seasonType = team.season_type || 'unknown';
      if (Array.isArray(team.games) && team.games[0]) {
        const g = team.games[0];
        const bostonHome = !!g.home;
        return { teamKey, sport, seasonType, played: !!team.played, bostonScore: g.redsox_score ?? g.boston_score, oppScore: g.opponent_score, opponent: g.opponent || '', bostonHome };
      }
      if (team.home_team || team.away_team) {
        const homeLower = (team.home_team || '').toLowerCase();
        const BOSTON_FULL = ['boston celtics','boston bruins','boston red sox','new england patriots'];
        const bostonHome = BOSTON_FULL.includes(homeLower);
        return { teamKey, sport, seasonType, played: !!team.played, bostonScore: bostonHome ? team.home_score : team.away_score, oppScore: bostonHome ? team.away_score : team.home_score, opponent: bostonHome ? team.away_team : team.home_team, bostonHome };
      }
      return { teamKey, sport, seasonType, played: !!team.played, bostonScore: null, oppScore: null, opponent: '', bostonHome: null };
    }

    function buildStatSplash(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      let game = null, raw = null;
      for (const k of keys) {
        const g = extractGame(k, boxScores[k]);
        if (g && g.played && g.bostonScore != null && g.oppScore != null) { game = g; raw = boxScores[k]; break; }
      }
      if (!game) return '';
      const won = game.bostonScore > game.oppScore;
      const bostonName = BOSTON_DISPLAY_NAME[game.teamKey] || 'BOSTON';
      const resultLabel = won ? `${bostonName} WIN` : `${bostonName} LOSS`;
      const scoreDisplay = `${game.bostonScore}–${game.oppScore}`;
      const subtitleMap = { celtics: won ? 'DOMINANT FOURTH QUARTER' : 'TOUGH NIGHT IN THE GARDEN', bruins: won ? 'SOLID ROAD WIN' : 'LATE COLLAPSE COSTS THEM', redsox: won ? 'YAWKEY WAY WINS' : 'ANOTHER ROUGH NIGHT AT FENWAY', patriots: won ? 'PATRIOTS TAKE IT' : 'LONG ROAD HOME' };
      const subtitle = subtitleMap[game.teamKey] || (won ? 'BOSTON WINS' : 'BOSTON LOSES');
      let leadersHtml = '';
      if (raw && Array.isArray(raw.games) && raw.games[0]) { const g = raw.games[0]; const topHitter = (g.top_hitters || [])[0]; if (topHitter) leadersHtml += `<div class="stat-splash-leader-item"><span class="stat-splash-leader-tag">${escapeHtml(bostonName)} LEADER</span><span class="stat-splash-leader-name">${escapeHtml(topHitter.name)}</span><span class="stat-splash-leader-stats">${escapeHtml(`${topHitter.hits}-for-${topHitter.ab} · ${topHitter.season_avg} avg`)}</span></div>`; }
      return `<div class="stat-splash"><div class="stat-splash-number">${escapeHtml(scoreDisplay)}</div><div class="stat-splash-label">${escapeHtml(resultLabel)}</div><div class="stat-splash-subtitle">${escapeHtml(subtitle)}</div>${leadersHtml ? `<div class="stat-splash-leader">${leadersHtml}</div>` : ''}</div>`;
    }

    function buildScoreboardWidget(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      const rows = keys.map(k => {
        const team = boxScores[k]; if (!team) return ''; const g = extractGame(k, team); const bostonName = BOSTON_DISPLAY_NAME[k];
        const iconName = SPORT_ICON[g.sport] || 'sports'; const iconCls = SPORT_CLASS[g.sport] || '';
        const sportIcon = `<span class="ms ${iconCls}">${iconName}</span>`;
        if (g.seasonType === 'offseason' || (k === 'patriots' && !g.played)) return `<div class="score-row dim"><span class="score-sport-emoji">${sportIcon}</span><div class="score-matchup"><span class="team-code">${bostonName}</span></div><span class="score-status">Offseason</span></div>`;
        if (g.played && g.bostonScore != null && g.oppScore != null) {
          const won = g.bostonScore > g.oppScore; const oppCodeStr = oppCode(g.opponent); const connector = g.bostonHome ? 'vs' : '@';
          const leftName = bostonName; const leftScore = g.bostonScore; const rightName = oppCodeStr; const rightScore = g.oppScore;
          const leftWinCls = won ? 'win' : 'loss'; const rightWinCls = won ? 'loss' : 'win';
          return `<div class="score-row"><span class="score-sport-emoji">${sportIcon}</span><div class="score-matchup"><span class="team-code ${leftWinCls}">${escapeHtml(leftName)}</span><span class="team-score">${escapeHtml(leftScore)}</span><span class="vs">${connector}</span><span class="team-score">${escapeHtml(rightScore)}</span><span class="team-code ${rightWinCls}">${escapeHtml(rightName)}</span></div><span class="score-status">Final</span></div>`;
        }
        const oppStr = g.opponent ? oppCode(g.opponent) : '—'; const connector = g.bostonHome ? 'vs' : (g.opponent ? '@' : '');
        return `<div class="score-row dim"><span class="score-sport-emoji">${sportIcon}</span><div class="score-matchup"><span class="team-code">${bostonName}</span>${connector ? `<span class="vs">${connector}</span>` : ''}${g.opponent ? `<span class="team-code">${escapeHtml(oppStr)}</span>` : ''}</div><span class="score-status">—</span></div>`;
      }).join('');
      return `<section class="widget scoreboard"><header class="widget-header"><span class="ms">trophy</span><span>Last Game</span></header><div class="score-rows">${rows}</div></section>`;
    }

    function buildMobileStrip(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      const cards = keys.map(k => {
        const team = boxScores[k]; if (!team) return ''; const g = extractGame(k, team); const bostonName = BOSTON_DISPLAY_NAME[k]; const sportLabel = g.sport || '';
        if (g.seasonType === 'offseason' || (k === 'patriots' && !g.played)) return `<div class="mobile-score-card"><span class="msc-sport">${sportLabel} · ${bostonName}</span><span class="msc-match">Offseason</span><span class="msc-status">—</span></div>`;
        if (g.played && g.bostonScore != null && g.oppScore != null) { const won = g.bostonScore > g.oppScore; const oppCodeStr = oppCode(g.opponent); const bostonCls = won ? 'win' : 'loss'; const connector = g.bostonHome ? 'vs' : '@'; return `<div class="mobile-score-card"><span class="msc-sport">${sportLabel}</span><span class="msc-match"><span class="${bostonCls}">${bostonName}</span> ${g.bostonScore} ${connector} ${oppCodeStr} ${g.oppScore}</span><span class="msc-status">Final · ${won ? 'WIN' : 'LOSS'}</span></div>`; }
        const oppStr = g.opponent ? oppCode(g.opponent) : 'TBD'; const connector = g.bostonHome ? 'vs' : (g.opponent ? '@' : '');
        return `<div class="mobile-score-card"><span class="msc-sport">${sportLabel}</span><span class="msc-match">${bostonName} ${connector} ${oppStr}</span><span class="msc-status">Scheduled</span></div>`;
      }).join('');
      return `<div class="mobile-strip"><div class="mobile-strip-inner">${cards}</div></div>`;
    }

    function buildScheduleSection(schedule) {
      if (!schedule || !schedule.length) return '';
      const grouped = {}; schedule.forEach(item => { const d = item.date; if (!grouped[d]) grouped[d] = []; grouped[d].push(item); });
      const html = Object.keys(grouped).map(date => {
        const label = grouped[date][0] ? shortDate(date).toUpperCase() : '';
        const rows = grouped[date].map(item => `<div class="schedule-row"><span class="schedule-matchup">${escapeHtml(item.matchup || '')}</span><span class="schedule-time">${escapeHtml(item.time_et || 'TBD')}</span></div>`).join('');
        return `<div class="schedule-date-label">${label}</div>${rows}`;
      }).join('');
      return `<section class="widget schedule-section" id="schedule"><header class="widget-header"><span class="ms">calendar_month</span><span>Upcoming</span></header><div class="nextup-rows">${html}</div></section>`;
    }

    function buildTrendPulseWidget(trends) {
      if (!trends || !trends.length) return '';
      const cards = trends.map((t, i) => `<div class="pulse-card${i > 0 ? ' pulse-card--sep' : ''}"><span class="pulse-category">${escapeHtml(t.category || 'Trend')}</span><div class="pulse-player">${escapeHtml(t.player || '')}</div><p class="pulse-trend">${escapeHtml(t.trend || '')}</p>${t.dans_take ? `<p class="pulse-take">"${escapeHtml(t.dans_take)}"</p>` : ''}</div>`).join('');
      return `<section class="widget pulse" id="trends"><header class="widget-header"><span class="ms">trending_up</span><span>Trends</span></header>${cards}</section>`;
    }

    function buildNewsPulseWidget(news) {
      if (!news || !news.length) return '';
      const items = news.map((item, i) => `<div class="pulse-card${i > 0 ? ' pulse-card--sep' : ''}"><a class="pulse-news-headline" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.headline || '')}</a>${item.dans_take ? `<p class="pulse-take">"${escapeHtml(item.dans_take)}"</p>` : ''}</div>`).join('');
      return `<section class="widget" id="news"><header class="widget-header"><span class="ms">newspaper</span><span>News</span></header>${items}</section>`;
    }

    function render(data) {
      const brew = data.morning_brew || []; const para0 = brew[0] || ''; const para1 = brew[1] || ''; const para2 = brew[2] || '';
      const headlineSource = data.headline || trimHeadlineFromBody(para0);
      const heroHtml = buildHeroHeadline(headlineSource); const statSplash = buildStatSplash(data.box_scores);
      const bodyHtml = `<div class="morning-brew" id="brew">${para0 ? `<p>${escapeHtml(para0)}</p>` : ''}${para1 ? `<p>${escapeHtml(para1)}</p>` : ''}${para2 ? `<p>${escapeHtml(para2)}</p>` : ''}<a href="https://forms.gle/mtXe54Kwa2HqCtpc6" target="_blank" rel="noopener noreferrer" class="feedback-button">Send Feedback</a></div>`;
      const mobileStripHtml = buildMobileStrip(data.box_scores); const scoreboardHtml = buildScoreboardWidget(data.box_scores); const pulseHtml = buildTrendPulseWidget(data.trend_watch); const newsPulseHtml = buildNewsPulseWidget(data.news_digest); const scheduleHtml = buildScheduleSection(data.schedule);
      const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      const app = document.getElementById('app');
      app.innerHTML = `<div class="page"><header class="hero"><h1 class="hero-headline">${heroHtml}</h1></header><p class="hero-date">${dateStr}</p><div class="fold-grid"><div class="main-col">${bodyHtml}${scheduleHtml}</div><aside class="rail-col" aria-label="Dashboard widgets">${scoreboardHtml}${pulseHtml}${newsPulseHtml}</aside></div>${mobileStripHtml}<footer class="site-footer">Powered by Dunks ☕ and Gemini AI &mdash; updated daily at 03:00 ET</footer></div>`;
    }

    function renderError(message) { const app = document.getElementById('app'); app.innerHTML = `<div class="page"><div class="error-state"><h2 class="error-title">Couldn't load today's take</h2><p class="error-message">${escapeHtml(message)}</p></div></div>`; }

    (async function init() {
      try {
        const res = await fetch('./data/daily_output.json');
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error('[Boston Dans Hub] Failed to load data:', err);
        renderError(err.message || 'Unknown error. Try refreshing.');
      }
    })();
  </script>
</body>
</html>
