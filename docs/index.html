<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Dan's Hub — Daily Boston Sports Commentary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">☕ Boston Dan's Hub</h1>
                <p class="tagline">Your daily Boston sports takes, brewed fresh.</p>
                <p class="updated" id="updated-time">Loading...</p>
            </div>
        </header>

        <!-- Error/Fallback Banner -->
        <div id="fallback-banner" class="fallback-banner" style="display: none;">
            <p>🍪 Dan's on a coffee break. Check back tomorrow for fresh takes!</p>
        </div>

        <!-- Main Content -->
        <main>
            <!-- Morning Brew -->
            <section id="morning-brew-section" class="section">
                <h2 class="section-title">☕ Morning Brew</h2>
                <div id="morning-brew" class="morning-brew"></div>
            </section>

            <!-- Trend Watch -->
            <section id="trend-watch-section" class="section" style="display: none;">
                <h2 class="section-title">📈 Trend Watch</h2>
                <div id="trend-watch" class="trends"></div>
            </section>

            <!-- News Digest -->
            <section id="news-digest-section" class="section" style="display: none;">
                <h2 class="section-title">📰 News Digest</h2>
                <div id="news-digest" class="news-items"></div>
            </section>

            <!-- Box Scores -->
            <section id="box-scores-section" class="section" style="display: none;">
                <h2 class="section-title">🏒 Last Night's Scores</h2>
                <div id="box-scores" class="scores-grid"></div>
            </section>

            <!-- Schedule -->
            <section id="schedule-section" class="section" style="display: none;">
                <h2 class="section-title">📅 Coming Up</h2>
                <div id="schedule" class="schedule-list"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by Dunks ☕ and Gemini AI — updated daily at 03:00 ET</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
