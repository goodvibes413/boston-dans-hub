<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boston Dan's Hub — The Broadsheet Columnist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:ital,wght@0,400;0,500;0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* =============================================
       DESIGN TOKENS
    ============================================= */
    :root {
      --surface-base:    #131313;
      --surface-lowest:  #0E0E0E;
      --surface-low:     #1B1B1C;
      --surface:         #202020;
      --surface-high:    #2A2A2A;
      --surface-highest: #353535;
      --primary:         #43ED9E;
      --primary-container: #00D084;
      --on-primary:      #003920;
      --danger:          #BD3039;
      --on-surface:      #F5F5F5;
      --on-surface-variant: #D5D5D5;
      --on-surface-muted:   #999999;
      --on-surface-dim:     #666666;
      --shadow-ambient:  0 40px 60px rgba(229, 226, 225, 0.04);
      --font-display:    'Space Grotesk', sans-serif;
      --font-body:       'Inter', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--surface-base);
      color: var(--on-surface-variant);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* =============================================
       NAV
    ============================================= */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(19, 19, 19, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .nav-brand {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-date-strip {
      display: flex;
      align-items: center;
      gap: 18px;
      flex: 1;
      justify-content: center;
    }

    .date-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: var(--font-body);
      font-weight: 500;
      color: var(--on-surface-muted);
      line-height: 1;
      white-space: nowrap;
      gap: 4px;
      min-height: 44px;
      justify-content: center;
      padding: 0 6px;
    }

    .date-item.today {
      color: var(--primary);
      font-weight: 700;
      border-bottom: 2px solid var(--primary);
    }

    .date-item .day-label {
      font-size: 0.625rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .date-item .day-num {
      font-size: 0.8125rem;
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--on-surface-muted);
      transition: color 0.2s ease;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .nav-links a:hover { color: var(--on-surface); }

    /* =============================================
       CONTAINER
    ============================================= */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px 48px;
    }

    /* =============================================
       HERO
    ============================================= */
    .hero {
      margin-bottom: 32px;
      max-width: 780px;
    }

    .article-kicker {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--primary);
      margin-bottom: 14px;
    }

    .hero-headline {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 700;
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .hero-headline .line-odd  { color: var(--on-surface); display: block; }
    .hero-headline .line-even { color: var(--primary);   display: block; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }

    .meta-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface-highest);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      color: var(--primary);
      flex-shrink: 0;
    }

    .meta-info { display: flex; flex-direction: column; gap: 1px; }

    .meta-author {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--on-surface);
    }
    .meta-byline {
      font-size: 0.75rem;
      color: var(--on-surface-muted);
    }

    /* =============================================
       ABOVE-FOLD GRID
    ============================================= */
    .fold-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 48px;
      align-items: start;
    }

    .main-col { min-width: 0; }

    .rail-col {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* =============================================
       MOBILE SCORE STRIP (only visible <768px)
    ============================================= */
    .mobile-strip {
      display: none;
    }

    /* =============================================
       MORNING BREW
    ============================================= */
    .morning-brew p {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.65;
      color: var(--on-surface-variant);
      margin-bottom: 18px;
    }

    /* =============================================
       STAT SPLASH
    ============================================= */
    .stat-splash {
      background: var(--surface-highest);
      border-radius: 8px;
      padding: 24px 28px;
      margin: 24px 0;
      box-shadow: var(--shadow-ambient);
    }
    .stat-splash-number {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-splash-label {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--on-surface-muted);
      margin-top: 8px;
    }
    .stat-splash-subtitle {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      margin-top: 4px;
    }
    .stat-splash-leader {
      margin-top: 18px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }
    .stat-splash-leader-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-splash-leader-tag {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--primary);
    }
    .stat-splash-leader-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--on-surface);
    }
    .stat-splash-leader-stats {
      font-size: 0.75rem;
      color: var(--on-surface-muted);
    }

    /* =============================================
       BLOCKQUOTE
    ============================================= */
    blockquote.featured-quote {
      border-left: 3px solid var(--primary);
      padding: 6px 0 6px 20px;
      margin: 24px 0;
    }
    blockquote.featured-quote p {
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 500;
      font-size: 1.0625rem !important;
      line-height: 1.55 !important;
      color: var(--on-surface) !important;
      margin-bottom: 0 !important;
    }
    blockquote.featured-quote p::first-letter {
      font-size: 1.0625rem !important;
      float: none !important;
      line-height: inherit !important;
      margin: 0 !important;
      color: var(--on-surface) !important;
      font-family: var(--font-body) !important;
    }

    /* =============================================
       TAG CHIPS
    ============================================= */
    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 28px;
    }
    .tag-chip {
      background: var(--surface);
      color: var(--primary);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 14px;
      border-radius: 100px;
      cursor: pointer;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      transition: background 0.2s ease;
    }
    .tag-chip:hover { background: var(--surface-high); }

    /* =============================================
       RAIL WIDGETS
    ============================================= */
    .widget {
      background: var(--surface-low);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow-ambient);
    }

    .widget-header {
      font-family: var(--font-display);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--on-surface-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Scoreboard rows */
    .score-rows { display: flex; flex-direction: column; gap: 8px; }

    .score-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 10px;
      background: var(--surface-highest);
      padding: 12px 14px;
      border-radius: 6px;
      min-height: 48px;
      font-family: var(--font-body);
      font-size: 0.8125rem;
    }
    .score-row.dim { opacity: 0.5; }

    .score-sport-emoji { font-size: 1rem; line-height: 1; }

    .score-matchup {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: var(--on-surface);
      letter-spacing: 0.3px;
    }
    .score-matchup .team-code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.8125rem;
      letter-spacing: 0.5px;
    }
    .score-matchup .team-code.win  { color: var(--primary); }
    .score-matchup .team-code.loss { color: var(--danger); }
    .score-matchup .team-score {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--on-surface);
      margin: 0 2px;
    }
    .score-matchup .vs {
      color: var(--on-surface-muted);
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: lowercase;
    }

    .score-status {
      font-size: 0.625rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--on-surface-muted);
      justify-self: end;
    }

    /* Next up rows */
    .nextup-rows { display: flex; flex-direction: column; gap: 6px; }

    .nextup-row {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 6px;
      background: var(--surface-highest);
      min-height: 48px;
      font-size: 0.75rem;
    }

    .nextup-date {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--primary);
    }

    .nextup-matchup {
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--on-surface);
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nextup-time {
      font-size: 0.6875rem;
      color: var(--on-surface-muted);
      font-weight: 500;
      justify-self: end;
    }

    /* Trend pulse */
    .pulse-category {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary-container), var(--primary));
      color: var(--on-primary);
      font-family: var(--font-body);
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 3px;
      margin-bottom: 10px;
    }
    .pulse-player {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .pulse-trend {
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      line-height: 1.45;
      margin-bottom: 10px;
    }
    .pulse-take {
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--primary);
      line-height: 1.5;
    }

    /* =============================================
       BELOW-FOLD SECTIONS
    ============================================= */
    .below-fold { margin-top: 48px; }

    .section {
      margin-bottom: 48px;
    }

    .section-header {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }

    /* Trend Watch — 3-col desktop */
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .trend-card {
      background: var(--surface-low);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow-ambient);
      transition: background 0.2s ease;
    }
    .trend-card:hover { background: var(--surface-highest); }

    .trend-category-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--primary-container), var(--primary));
      color: var(--on-primary);
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .trend-player {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 6px;
      line-height: 1.2;
    }
    .trend-text {
      font-size: 0.875rem;
      color: var(--on-surface-muted);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .trend-take {
      font-style: italic;
      font-size: 0.875rem;
      color: var(--primary);
      line-height: 1.5;
    }

    /* News Digest — 2-col desktop */
    .news-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 28px;
    }
    .news-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 0;
      min-height: 44px;
      justify-content: center;
    }
    .news-headline {
      font-family: var(--font-display);
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.3;
      transition: color 0.2s ease;
    }
    .news-headline:hover { color: var(--danger); }
    .news-take {
      font-style: italic;
      font-size: 0.8125rem;
      color: var(--on-surface-muted);
      line-height: 1.5;
    }


    /* Footer */
    .site-footer {
      text-align: center;
      padding: 24px 16px 0;
      font-size: 0.75rem;
      color: var(--on-surface-dim);
    }

    /* Loading / Error */
    .loading-state, .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--surface-highest);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--font-display);
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--on-surface-muted);
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--danger);
    }
    .error-message { font-size: 0.9375rem; color: var(--on-surface-muted); }

    /* =============================================
       RESPONSIVE — TABLET (768–1023px)
    ============================================= */
    @media (max-width: 1023px) {
      .fold-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }
      .rail-col {
        position: static;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .rail-col .widget.pulse { grid-column: 1 / -1; }

      .trend-grid { grid-template-columns: repeat(2, 1fr); }
      .news-grid  { grid-template-columns: 1fr; }
    }

    /* =============================================
       RESPONSIVE — MOBILE (<768px)
    ============================================= */
    @media (max-width: 767px) {
      .nav { padding: 0 16px; gap: 10px; }
      .nav-links { display: none; }
      .nav-date-strip { gap: 14px; }

      .page { padding: 20px 16px 32px; }

      .hero { margin-bottom: 20px; }
      .hero-headline { font-size: clamp(1.875rem, 7vw, 2.5rem); }

      .morning-brew p { font-size: 1rem; }
      .morning-brew p:first-child::first-letter {
        font-size: 3rem;
        margin-right: 8px;
      }

      /* Replace sticky rail with horizontal scroll strip of scores
         shown *before* the morning brew body */
      .rail-col { display: none; }
      .mobile-strip {
        display: block;
        margin-bottom: 24px;
        margin-left: -16px;
        margin-right: -16px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
      }
      .mobile-strip::-webkit-scrollbar { display: none; }
      .mobile-strip-inner {
        display: flex;
        gap: 10px;
        padding: 0 16px;
        min-width: min-content;
      }
      .mobile-score-card {
        flex: 0 0 auto;
        min-width: 160px;
        background: var(--surface-low);
        border-radius: 8px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .mobile-score-card .msc-sport {
        font-size: 0.625rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--on-surface-muted);
        font-weight: 700;
      }
      .mobile-score-card .msc-match {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.875rem;
        color: var(--on-surface);
      }
      .mobile-score-card .msc-match .win  { color: var(--primary); }
      .mobile-score-card .msc-match .loss { color: var(--danger); }
      .mobile-score-card .msc-status {
        font-size: 0.625rem;
        color: var(--on-surface-muted);
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .section { margin-bottom: 32px; }
      .trend-grid { grid-template-columns: 1fr; gap: 12px; }
      .news-grid  { grid-template-columns: 1fr; gap: 18px; }

      .stat-splash { padding: 20px; }
      .subscribe-cta { padding: 32px 20px; }
      .subscribe-input { width: 100%; max-width: 280px; }
    }

    @media (max-width: 440px) {
      .nav-date-strip { gap: 10px; }
      .date-item .day-label { font-size: 0.5625rem; }
      .date-item .day-num { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <span class="nav-brand">Boston Dan's Morning Brew</span>
    <div class="nav-date-strip" id="nav-date-strip" aria-label="Week navigation"></div>
    <nav class="nav-links" aria-label="Section links">
      <a href="#brew">Today's Rant</a>
      <a href="#trends">Trends</a>
    </nav>
  </nav>

  <!-- MAIN CONTENT -->
  <div id="app">
    <div class="page">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading today's take…</p>
      </div>
    </div>
  </div>

  <script>
    /* =============================================
       CONSTANTS
    ============================================= */
    const SPORT_MAP = {
      celtics:  'NBA',
      bruins:   'NHL',
      redsox:   'MLB',
      patriots: 'NFL',
    };
    const BOSTON_CODE = {
      celtics:  'BOS',
      bruins:   'BOS',
      redsox:   'BOS',
      patriots: 'NE',
    };
    const BOSTON_DISPLAY_NAME = {
      celtics:  'CELTICS',
      bruins:   'BRUINS',
      redsox:   'RED SOX',
      patriots: 'PATRIOTS',
    };
    const SPORT_EMOJI = {
      NBA: '🏀', NHL: '🏒', MLB: '⚾', NFL: '🏈'
    };

    /* Team → 3-letter code lookup for opponents */
    const OPP_CODE = {
      'detroit tigers': 'DET',
      'new york yankees': 'NYY',
      'philadelphia 76ers': 'PHI',
      'philadelphia flyers': 'PHI',
      'buffalo sabres': 'BUF',
      'boston celtics': 'BOS',
      'boston bruins': 'BOS',
      'boston red sox': 'BOS',
      'new england patriots': 'NE',
    };

    /* =============================================
       UTILITIES
    ============================================= */
    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t == null ? '' : String(t);
      return d.innerHTML;
    }

    function oppCode(name) {
      if (!name) return 'OPP';
      const key = String(name).toLowerCase();
      if (OPP_CODE[key]) return OPP_CODE[key];
      // Fallback: take last word, first 3 letters
      const words = String(name).trim().split(/\s+/);
      const last = words[words.length - 1] || 'OPP';
      return last.slice(0, 3).toUpperCase();
    }

    function formatScheduleDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length < 3) return dateStr;
      const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
    }

    function shortDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length < 3) return dateStr;
      const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      return `${days[d.getDay()]} ${d.getDate()}`;
    }

    /* =============================================
       DATA EXTRACTION — handles both shapes
       (nested `games[0]` or flat)
    ============================================= */
    function extractGame(teamKey, team) {
      if (!team) return null;
      const sport = team.sport || SPORT_MAP[teamKey];
      const seasonType = team.season_type || 'unknown';

      // Nested shape (Red Sox raw)
      if (Array.isArray(team.games) && team.games[0]) {
        const g = team.games[0];
        const bostonHome = !!g.home;
        return {
          teamKey,
          sport,
          seasonType,
          played: !!team.played,
          bostonScore: g.redsox_score ?? g.boston_score,
          oppScore:    g.opponent_score,
          opponent:    g.opponent || '',
          bostonHome,
        };
      }

      // Flat shape (post-normalize)
      if (team.home_team || team.away_team) {
        const homeLower = (team.home_team || '').toLowerCase();
        const BOSTON_FULL = ['boston celtics','boston bruins','boston red sox','new england patriots'];
        const bostonHome = BOSTON_FULL.includes(homeLower);
        return {
          teamKey,
          sport,
          seasonType,
          played: !!team.played,
          bostonScore: bostonHome ? team.home_score : team.away_score,
          oppScore:    bostonHome ? team.away_score : team.home_score,
          opponent:    bostonHome ? team.away_team   : team.home_team,
          bostonHome,
        };
      }

      // Empty / unplayed
      return {
        teamKey,
        sport,
        seasonType,
        played: !!team.played,
        bostonScore: null,
        oppScore: null,
        opponent: '',
        bostonHome: null,
      };
    }

    /* =============================================
       HERO HEADLINE
    ============================================= */
    function buildHeroHeadline(text) {
      const words = (text || '').trim().split(/\s+/).slice(0, 12);
      const chunks = [];
      for (let i = 0; i < words.length; i += 4) chunks.push(words.slice(i, i + 4).join(' '));
      return chunks.map((chunk, idx) => {
        const cls = (idx % 2 === 0) ? 'line-odd' : 'line-even';
        return `<span class="${cls}">${escapeHtml(chunk)}</span>`;
      }).join('');
    }

    function trimHeadlineFromBody(text) {
      // Remove the first 12 words (same as headline) so body continues smoothly
      const words = (text || '').trim().split(/\s+/);
      return words.slice(12).join(' ');
    }

    /* =============================================
       STAT SPLASH (inside morning brew)
       Picks first played Boston game.
    ============================================= */
    function buildStatSplash(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      let game = null, raw = null;
      for (const k of keys) {
        const g = extractGame(k, boxScores[k]);
        if (g && g.played && g.bostonScore != null && g.oppScore != null) {
          game = g;
          raw = boxScores[k];
          break;
        }
      }
      if (!game) return '';

      const won = game.bostonScore > game.oppScore;
      const bostonName = BOSTON_DISPLAY_NAME[game.teamKey] || 'BOSTON';
      const resultLabel = won ? `${bostonName} WIN` : `${bostonName} LOSS`;
      const scoreDisplay = `${game.bostonScore}–${game.oppScore}`;

      const subtitleMap = {
        celtics:  won ? 'DOMINANT FOURTH QUARTER' : 'TOUGH NIGHT IN THE GARDEN',
        bruins:   won ? 'SOLID ROAD WIN'           : 'LATE COLLAPSE COSTS THEM',
        redsox:   won ? 'YAWKEY WAY WINS'          : 'ANOTHER ROUGH NIGHT AT FENWAY',
        patriots: won ? 'PATRIOTS TAKE IT'         : 'LONG ROAD HOME',
      };
      const subtitle = subtitleMap[game.teamKey] || (won ? 'BOSTON WINS' : 'BOSTON LOSES');

      // Leader info — pull from raw since extractGame doesn't carry it
      let leadersHtml = '';
      if (raw && Array.isArray(raw.games) && raw.games[0]) {
        const g = raw.games[0];
        const topHitter = (g.top_hitters || [])[0];
        if (topHitter) {
          leadersHtml += `
            <div class="stat-splash-leader-item">
              <span class="stat-splash-leader-tag">${escapeHtml(bostonName)} LEADER</span>
              <span class="stat-splash-leader-name">${escapeHtml(topHitter.name)}</span>
              <span class="stat-splash-leader-stats">${escapeHtml(`${topHitter.hits}-for-${topHitter.ab} · ${topHitter.season_avg} avg`)}</span>
            </div>
          `;
        }
      } else if (raw) {
        const bLeader = game.bostonHome ? raw.home_leader : raw.away_leader;
        const bStats  = game.bostonHome ? raw.home_leader_stats : raw.away_leader_stats;
        if (bLeader) {
          leadersHtml += `
            <div class="stat-splash-leader-item">
              <span class="stat-splash-leader-tag">${escapeHtml(bostonName)} LEADER</span>
              <span class="stat-splash-leader-name">${escapeHtml(bLeader)}</span>
              <span class="stat-splash-leader-stats">${escapeHtml(bStats || '')}</span>
            </div>
          `;
        }
      }

      return `
        <div class="stat-splash">
          <div class="stat-splash-number">${escapeHtml(scoreDisplay)}</div>
          <div class="stat-splash-label">${escapeHtml(resultLabel)}</div>
          <div class="stat-splash-subtitle">${escapeHtml(subtitle)}</div>
          ${leadersHtml ? `<div class="stat-splash-leader">${leadersHtml}</div>` : ''}
        </div>
      `;
    }

    /* =============================================
       SCOREBOARD WIDGET (rail)
    ============================================= */
    function buildScoreboardWidget(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      const rows = keys.map(k => {
        const team = boxScores[k];
        if (!team) return '';
        const g = extractGame(k, team);
        const emoji = SPORT_EMOJI[g.sport] || '•';
        const bostonCode = BOSTON_CODE[k];

        // Offseason
        if (g.seasonType === 'offseason' || (k === 'patriots' && !g.played)) {
          return `
            <div class="score-row dim">
              <span class="score-sport-emoji">${emoji}</span>
              <div class="score-matchup">
                <span class="team-code">${bostonCode}</span>
              </div>
              <span class="score-status">Offseason</span>
            </div>
          `;
        }

        // Played
        if (g.played && g.bostonScore != null && g.oppScore != null) {
          const won = g.bostonScore > g.oppScore;
          const oppCodeStr = oppCode(g.opponent);
          const connector = g.bostonHome ? 'vs' : '@';
          // Score order: home team first if Boston home, else opp first
          const leftCode  = g.bostonHome ? bostonCode   : oppCodeStr;
          const leftScore = g.bostonHome ? g.bostonScore : g.oppScore;
          const rightCode = g.bostonHome ? oppCodeStr   : bostonCode;
          const rightScore= g.bostonHome ? g.oppScore    : g.bostonScore;
          const leftWinCls  = (g.bostonHome && won) ? 'win' : (!g.bostonHome && !won) ? 'loss' : '';
          const rightWinCls = (!g.bostonHome && won) ? 'win' : (g.bostonHome && !won) ? 'loss' : '';
          return `
            <div class="score-row">
              <span class="score-sport-emoji">${emoji}</span>
              <div class="score-matchup">
                <span class="team-code ${leftWinCls}">${escapeHtml(leftCode)}</span>
                <span class="team-score">${escapeHtml(leftScore)}</span>
                <span class="vs">${connector}</span>
                <span class="team-score">${escapeHtml(rightScore)}</span>
                <span class="team-code ${rightWinCls}">${escapeHtml(rightCode)}</span>
              </div>
              <span class="score-status">Final</span>
            </div>
          `;
        }

        // Scheduled / not played
        const oppStr = g.opponent ? oppCode(g.opponent) : '—';
        const connector = g.bostonHome ? 'vs' : (g.opponent ? '@' : '');
        return `
          <div class="score-row dim">
            <span class="score-sport-emoji">${emoji}</span>
            <div class="score-matchup">
              <span class="team-code">${bostonCode}</span>
              ${connector ? `<span class="vs">${connector}</span>` : ''}
              ${g.opponent ? `<span class="team-code">${escapeHtml(oppStr)}</span>` : ''}
            </div>
            <span class="score-status">—</span>
          </div>
        `;
      }).join('');

      return `
        <section class="widget scoreboard">
          <header class="widget-header"><span>Last Night</span></header>
          <div class="score-rows">${rows}</div>
        </section>
      `;
    }

    /* =============================================
       MOBILE SCORE STRIP
    ============================================= */
    function buildMobileStrip(boxScores) {
      if (!boxScores) return '';
      const keys = ['celtics','bruins','redsox','patriots'];
      const cards = keys.map(k => {
        const team = boxScores[k];
        if (!team) return '';
        const g = extractGame(k, team);
        const bostonCode = BOSTON_CODE[k];
        const sportLabel = g.sport || '';

        if (g.seasonType === 'offseason' || (k === 'patriots' && !g.played)) {
          return `
            <div class="mobile-score-card">
              <span class="msc-sport">${sportLabel} · ${bostonCode}</span>
              <span class="msc-match">Offseason</span>
              <span class="msc-status">—</span>
            </div>
          `;
        }

        if (g.played && g.bostonScore != null && g.oppScore != null) {
          const won = g.bostonScore > g.oppScore;
          const oppCodeStr = oppCode(g.opponent);
          const bostonCls = won ? 'win' : 'loss';
          const connector = g.bostonHome ? 'vs' : '@';
          return `
            <div class="mobile-score-card">
              <span class="msc-sport">${sportLabel}</span>
              <span class="msc-match">
                <span class="${bostonCls}">${bostonCode}</span> ${g.bostonScore} ${connector} ${oppCodeStr} ${g.oppScore}
              </span>
              <span class="msc-status">Final · ${won ? 'WIN' : 'LOSS'}</span>
            </div>
          `;
        }

        const oppStr = g.opponent ? oppCode(g.opponent) : 'TBD';
        const connector = g.bostonHome ? 'vs' : (g.opponent ? '@' : '');
        return `
          <div class="mobile-score-card">
            <span class="msc-sport">${sportLabel}</span>
            <span class="msc-match">${bostonCode} ${connector} ${oppStr}</span>
            <span class="msc-status">Scheduled</span>
          </div>
        `;
      }).join('');

      return `
        <div class="mobile-strip">
          <div class="mobile-strip-inner">${cards}</div>
        </div>
      `;
    }

    /* =============================================
       NEXT UP WIDGET
    ============================================= */
    function buildNextUpWidget(schedule) {
      if (!schedule || !schedule.length) return '';
      const rows = schedule.slice(0, 3).map(item => `
        <div class="nextup-row">
          <span class="nextup-date">${escapeHtml(shortDate(item.date))}</span>
          <span class="nextup-matchup">${escapeHtml(item.matchup || '')}</span>
          <span class="nextup-time">${escapeHtml(item.time_et || 'TBD')}</span>
        </div>
      `).join('');
      return `
        <section class="widget nextup">
          <header class="widget-header"><span>Next Up</span></header>
          <div class="nextup-rows">${rows}</div>
        </section>
      `;
    }

    /* =============================================
       TREND PULSE WIDGET (top trend)
    ============================================= */
    function buildTrendPulseWidget(trends) {
      if (!trends || !trends.length) return '';
      const t = trends[0];
      return `
        <section class="widget pulse">
          <header class="widget-header"><span>Trend Pulse</span></header>
          <span class="pulse-category">${escapeHtml(t.category || 'Trend')}</span>
          <div class="pulse-player">${escapeHtml(t.player || '')}</div>
          <p class="pulse-trend">${escapeHtml(t.trend || '')}</p>
          ${t.dans_take ? `<p class="pulse-take">"${escapeHtml(t.dans_take)}"</p>` : ''}
        </section>
      `;
    }

    /* =============================================
       TREND WATCH (below-fold)
    ============================================= */
    function buildTrendWatch(trends) {
      if (!trends || !trends.length) return '';
      const cards = trends.map(t => `
        <div class="trend-card">
          <span class="trend-category-badge">${escapeHtml(t.category || 'Trend')}</span>
          <div class="trend-player">${escapeHtml(t.player || '')}</div>
          <p class="trend-text">${escapeHtml(t.trend || '')}</p>
          ${t.dans_take ? `<p class="trend-take">"${escapeHtml(t.dans_take)}"</p>` : ''}
        </div>
      `).join('');
      return `
        <section class="section" id="trends">
          <h2 class="section-header">Trend Watch</h2>
          <div class="trend-grid">${cards}</div>
        </section>
      `;
    }

    /* =============================================
       NEWS DIGEST (below-fold)
    ============================================= */
    function buildNewsDigest(news) {
      if (!news || !news.length) return '';
      const items = news.map(item => `
        <div class="news-item">
          <a class="news-headline" href="${escapeHtml(item.url || '#')}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(item.headline || '')}
          </a>
          ${item.dans_take ? `<p class="news-take">${escapeHtml(item.dans_take)}</p>` : ''}
        </div>
      `).join('');
      return `
        <section class="section" id="digest">
          <h2 class="section-header">News Digest</h2>
          <div class="news-grid">${items}</div>
        </section>
      `;
    }

    /* =============================================
       SUBSCRIBE CTA
    ============================================= */

    /* =============================================
       NAV DATE STRIP (dynamic, today-centered)
    ============================================= */
    function buildNavDateStrip() {
      const today = new Date();
      const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const out = [];
      for (let offset = -2; offset <= 2; offset++) {
        const d = new Date(today);
        d.setDate(today.getDate() + offset);
        const isToday = offset === 0;
        const label = days[d.getDay()];
        const numStr = isToday ? `${months[d.getMonth()]} ${d.getDate()}` : `${d.getDate()}`;
        out.push(`
          <div class="date-item ${isToday ? 'today' : ''}" ${isToday ? 'aria-current="date"' : ''}>
            <span class="day-label">${label}</span>
            <span class="day-num">${numStr}</span>
          </div>
        `);
      }
      document.getElementById('nav-date-strip').innerHTML = out.join('');
    }

    /* =============================================
       MAIN RENDER
    ============================================= */
    function render(data) {
      const brew = data.morning_brew || [];
      const para0 = brew[0] || '';
      const para1 = brew[1] || '';
      const para2 = brew[2] || '';

      const heroHtml   = buildHeroHeadline(para0);
      const statSplash = buildStatSplash(data.box_scores);

      // Body: p0 (trimmed to continue from headline) → stat splash → p1 → blockquote(p2)
      const para0Trimmed = trimHeadlineFromBody(para0);
      const bodyHtml = `
        <div class="morning-brew" id="brew">
          ${para0Trimmed ? `<p>${escapeHtml(para0Trimmed)}</p>` : ''}
          ${statSplash}
          ${para1 ? `<p>${escapeHtml(para1)}</p>` : ''}
          ${para2 ? `
            <blockquote class="featured-quote"><p>${escapeHtml(para2)}</p></blockquote>
          ` : ''}
        </div>
      `;

      const mobileStripHtml = buildMobileStrip(data.box_scores);
      const scoreboardHtml = buildScoreboardWidget(data.box_scores);
      const nextUpHtml     = buildNextUpWidget(data.schedule);
      const pulseHtml      = buildTrendPulseWidget(data.trend_watch);

      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page">

          <!-- HERO -->
          <header class="hero">
            <h1 class="hero-headline">${heroHtml}</h1>
          </header>

          <!-- Mobile horizontal score strip -->
          ${mobileStripHtml}

          <!-- ABOVE-FOLD TWO-COLUMN -->
          <div class="fold-grid">
            <div class="main-col">
              ${bodyHtml}
            </div>
            <aside class="rail-col" aria-label="Dashboard widgets">
              ${scoreboardHtml}
              ${nextUpHtml}
              ${pulseHtml}
            </aside>
          </div>

          <!-- BELOW-FOLD SECTIONS -->
          <div class="below-fold">
            ${buildTrendWatch(data.trend_watch)}
            ${buildNewsDigest(data.news_digest)}
          </div>

          <footer class="site-footer">
            Powered by Dunks ☕ and Gemini AI &mdash; updated daily at 03:00 ET
          </footer>
        </div>
      `;
    }

    function renderError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="page">
          <div class="error-state">
            <h2 class="error-title">Couldn't load today's take</h2>
            <p class="error-message">${escapeHtml(message)}</p>
          </div>
        </div>
      `;
    }

    /* =============================================
       INIT
    ============================================= */
    (async function init() {
      buildNavDateStrip();
      try {
        const res = await fetch('./data/daily_output.json');
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error('[v4] Failed to load data:', err);
        renderError(err.message || 'Unknown error. Try refreshing.');
      }
    })();
  </script>
</body>
